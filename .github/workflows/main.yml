name: Deploy React Portfolio

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v4

      - name: Setup Node.js ⚙️
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          
      - name: Install and Build 🏗️
        run: |
          npm ci
          npm run build
          # Copia el index.html como 404.html para que React Router v7 funcione sin almohadillas
          cp dist/index.html dist/404.html

      - name: Deploy to GitHub Pages 🚀
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist # ◄ CAMBIADO AQUÍ: Vite compila en 'dist'
          branch: gh-pages
